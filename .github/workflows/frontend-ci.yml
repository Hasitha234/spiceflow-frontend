name: Frontend CI

on:
  push:
    branches: [ 'main', 'develop' ]
  pull_request:
    branches: [ 'main', 'develop' ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Lint OpenAPI Specification (Spectral)
      run: npm run lint:api

    - name: Generate Orval API Client
      run: npm run generate:api

    - name: Run ESLint
      run: npm run lint

    - name: Type Check (TypeScript Strict Mode)
      run: npx tsc --noEmit

    - name: Build Production Bundle
      run: npm run build
